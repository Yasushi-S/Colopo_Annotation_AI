<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Colpo Annotation AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <header class="bg-teal-700 text-white shadow">
    <div class="max-w-[1600px] mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{{ url_for('case_list') }}" class="text-lg font-semibold hover:text-teal-100">
        Colpo Annotation AI
      </a>
      <span class="text-sm text-teal-100">院内ネットワーク限定・医師確認必須</span>
    </div>
  </header>
  <main class="max-w-[1600px] mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-[1600px] mx-auto px-4 py-4 text-xs text-slate-500 text-center">
    本アプリは診断確定AIではありません。最終判断は必ず医師が行ってください。
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
